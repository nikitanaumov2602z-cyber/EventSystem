name: Build Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET Framework
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '6.0.x'

      - name: Download EXILED references
        run: |
          mkdir lib
          cd lib
          curl -L https://github.com/Exiled-Team/EXILED/releases/latest/download/Exiled.API.dll -o Exiled.API.dll
          curl -L https://github.com/Exiled-Team/EXILED/releases/latest/download/Exiled.Events.dll -o Exiled.Events.dll
          curl -L https://github.com/Exiled-Team/EXILED/releases/latest/download/Assembly-CSharp-firstpass.dll -o Assembly-CSharp-firstpass.dll
          curl -L https://github.com/Exiled-Team/EXILED/releases/latest/download/Assembly-CSharp.dll -o Assembly-CSharp.dll

      - name: Build project
        run: |
          dotnet build -c Release /p:EXILED_REFERENCES=lib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EventSystem
          path: bin/Release/net48/EventSystem.dll
